symfonicat:
    vendors:
        - symfonicat
    admin:
        symfonicat_env_parent:
            -
                id: colors
        symfonicat_env:
            -
                id: primary
                env_parent_id: colors
        symfonicat_domain:
            -
                id: example.com
            -
                id: localhost
        symfonicat_domain_env:
            -
                id: 1
                value: blue
                domain_id: localhost
                env_id: primary
            -
                id: 2
                value: blue
                domain_id: example.com
                env_id: primary
        symfonicat_project:
            -
                id: core/project1
                vendor: core
        symfonicat_domain_project:
            -
                domain_id: example.com
                project_id: core/project1
        symfonicat_electron:
            -
                id: example-test
                name: 'Example Test'
                type: domain
                domain_id: example.com
                project_id: null
        symfonicat_electron_env:
            -
                id: 1
                value: yellow
                electron_id: example-test
                env_id: primary
        symfonicat_module:
            -
                id: symfonicat/analytics/main
                package: analytics
                vendor: symfonicat
        symfonicat_module_domain:
            -
                module_id: symfonicat/analytics/main
                domain_id: example.com
            -
                module_id: symfonicat/analytics/main
                domain_id: localhost
        symfonicat_module_project:
            -
                module_id: symfonicat/analytics/main
                project_id: core/project1
        symfonicat_project_env:
            -
                id: 1
                value: green
                project_id: core/project1
                env_id: primary