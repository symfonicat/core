symfonicat:
    symfonicat_parcel:
        -
            id: core/domainparcel
            path: assets/parcel/domainparcel
            vendor: core
        -
            id: core/endpointparcel
            path: assets/parcel/endpointparcel
            vendor: core
        -
            id: core/subdomainparcel
            path: assets/parcel/subdomainparcel
            vendor: core
        -
            id: symfonicat/analytics/analyticsparcel
            path: vendor/symfonicat/analytics/assets/parcel/analyticsparcel
            vendor: symfonicat
    symfonicat_domain:
        -
            id: tayp.me
            catch: false
            parcel_id: core/domainparcel
    symfonicat_subdomain:
        -
            id: subdomain1
            catch: false
            parcel_id: core/subdomainparcel
    symfonicat_endpoint:
        -
            id: test
            enforce: both
            catch: true
            arguments:
                - symfonicat
                - test
            parcel_id: core/endpointparcel
            domain_id: tayp.me
            subdomain_id: subdomain1
    symfonicat_application:
        -
            id: example-test
            name: 'Example Test'
            type: domain
            domain_id: tayp.me
            subdomain_id: null
            endpoint_id: null
    symfonicat_env_parent:
        -
            id: colors
    symfonicat_env:
        -
            id: primary
            env_parent_id: colors
    symfonicat_application_env:
        -
            id: 1
            value: yellow
            application_id: example-test
            env_id: primary
    symfonicat_domain_env:
        -
            id: 1
            value: blue
            domain_id: tayp.me
            env_id: primary
    symfonicat_middleware:
        -
            id: core/DomainMiddleware
            class: Symfonicat\Middleware\DomainMiddleware
        -
            id: core/EndpointMiddleware
            class: Symfonicat\Middleware\EndpointMiddleware
        -
            id: core/SubdomainMiddleware
            class: Symfonicat\Middleware\SubdomainMiddleware
        -
            id: core/TestMiddleware
            class: Symfonicat\Middleware\TestMiddleware
        -
            id: symfonicat/analytics/AnalyticsMiddleware
            class: Symfonicat\Middleware\AnalyticsMiddleware
    symfonicat_domain_middleware:
        -
            domain_id: tayp.me
            middleware_id: core/DomainMiddleware
        -
            domain_id: tayp.me
            middleware_id: symfonicat/analytics/AnalyticsMiddleware
    symfonicat_domain_subdomain:
        -
            domain_id: tayp.me
            subdomain_id: subdomain1
    symfonicat_endpoint_env:
        -
            id: 1
            value: purple
            endpoint_id: test
            env_id: primary
    symfonicat_endpoint_middleware:
        -
            endpoint_id: test
            middleware_id: core/EndpointMiddleware
    symfonicat_module:
        -
            id: symfonicat/analytics/main
            package: analytics
            vendor: symfonicat
    symfonicat_module_domain:
        -
            module_id: symfonicat/analytics/main
            domain_id: tayp.me
    symfonicat_module_endpoint:
        -
            module_id: symfonicat/analytics/main
            endpoint_id: test
    symfonicat_module_subdomain:
        -
            module_id: symfonicat/analytics/main
            subdomain_id: subdomain1
    symfonicat_parcel_env:
        -
            id: 1
            value: red
            parcel_id: core/domainparcel
            env_id: primary
        -
            id: 2
            value: orange
            parcel_id: core/endpointparcel
            env_id: primary
        -
            id: 3
            value: turquoise
            parcel_id: core/subdomainparcel
            env_id: primary
    symfonicat_subdomain_env:
        -
            id: 2
            value: green
            subdomain_id: subdomain1
            env_id: primary
    symfonicat_subdomain_middleware:
        -
            subdomain_id: subdomain1
            middleware_id: core/SubdomainMiddleware
