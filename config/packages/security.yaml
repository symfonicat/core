security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        symfonicat_admin_provider:
            id: Symfonicat\Security\AdminUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        admin:
            pattern: ^/admin
            provider: symfonicat_admin_provider
            form_login:
                login_path: symfonicat_admin_login
                check_path: symfonicat_admin_login_check
                default_target_path: symfonicat_admin_login
                always_use_default_target_path: true
                username_parameter: email
                password_parameter: password
                enable_csrf: true
                csrf_token_id: symfonicat_admin_login
            logout:
                path: /admin/logout/clear
                target: app_project_root
        main:
            lazy: true

    access_control:
        - { path: ^/admin/login/check, roles: PUBLIC_ACCESS }
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin/logout, roles: PUBLIC_ACCESS }
        - { path: ^/admin/logout/clear, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
